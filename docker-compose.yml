services:
  postgresdb:
    image: postgres
    restart: unless-stopped
    env_file: ./.env
    environment:
    - POSTGRES_USER=$DB_USER
    - POSTGRES_PASSWORD=$DB_PASSWORD
    - POSTGRES_DB=$DB_NAME
    command: postgres -c listen_addresses=0.0.0.0
    ports:
    - "127.0.0.1:5433:5432"
    volumes:
    - db:/var/lib/postgres

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
    - PGADMIN_DEFAULT_EMAIL=admin@admin.com
    - PGADMIN_DEFAULT_PASSWORD=admin
    - PGADMIN_CONFIG_SERVER_MODE=False
    ports:
    - "5050:80"
    volumes:
    - pgadmin:/var/lib/pgadmin
    depends_on:
    - postgresdb

  app:
    depends_on:
    - postgresdb
    build: .
    restart: unless-stopped
    env_file: ./.env
    ports:
    - $NODE_DOCKER_PORT:$NODE_DOCKER_PORT
    environment:
    - DB_HOST=postgresdb
    - DB_USER=$DB_USER
    - DB_PASSWORD=$DB_PASSWORD
    - DB_NAME=$DB_NAME
    - DB_PORT=5432
    stdin_open: true
    tty: true
    volumes:
    - .:/tunning-manual
    - /tunning-manual/node_modules
    - ./front:/tunning-manual/front

volumes:
  db:
  pgadmin:
